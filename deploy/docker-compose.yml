x-common-env: &common-env
  DATABASE_URL: postgresql+psycopg2://wced:${POSTGRES_PASSWORD:-wced}@postgres:5432/wced
  WCED_DB_DSN: postgresql+psycopg2://wced:${POSTGRES_PASSWORD:-wced}@postgres:5432/wced
  S3_ENDPOINT_URL: http://minio:9000
  S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
  S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
  S3_BUCKET: wced-rasters
  PREFECT_API_URL: http://prefect-server:4200/api
  REDIS_URL: redis://redis:6379/0
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
  FIRMS_MAP_KEY: ${FIRMS_MAP_KEY:-}
  ACLED_API_KEY: ${ACLED_API_KEY:-}
  ACLED_EMAIL: ${ACLED_EMAIL:-}
  ACLED_PASSWORD: ${ACLED_PASSWORD:-}
  SENTRY_DSN: ${SENTRY_DSN:-}
  WCED_ENVIRONMENT: ${WCED_ENVIRONMENT:-development}
  WCED_METHODOLOGY_VERSION: ${WCED_METHODOLOGY_VERSION:-1.0}

services:
  # ---------- infrastructure ----------

  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: wced
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wced}
      POSTGRES_DB: wced
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -U wced"]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 30s

  redis:
    image: redis:7-alpine
    volumes:
      - redisdata:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - miniodata:/data
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 3

  prefect-server:
    image: prefecthq/prefect:3-python3.11
    command: prefect server start --host 0.0.0.0
    environment:
      PREFECT_SERVER_DATABASE_CONNECTION_URL: postgresql+asyncpg://wced:${POSTGRES_PASSWORD:-wced}@postgres:5432/wced
    ports:
      - "${PREFECT_PORT:-4200}:4200"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:4200/api/health').raise_for_status()"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------- application ----------

  wced-api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api
    environment:
      <<: *common-env
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  wced-worker:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.pipeline
    environment:
      <<: *common-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      prefect-server:
        condition: service_healthy

  # ---------- observability ----------

  prometheus:
    image: prom/prometheus:v2.53.0
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheusdata:/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    depends_on:
      - wced-api
    profiles:
      - monitoring

  grafana:
    image: grafana/grafana:11.1.0
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-wced}
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/wced-dashboard.json
    volumes:
      - grafanadata:/var/lib/grafana
      - ./grafana/wced-dashboard.json:/var/lib/grafana/dashboards/wced-dashboard.json:ro
      - ./grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - ./grafana/dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml:ro
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    depends_on:
      - prometheus
    profiles:
      - monitoring

  # ---------- frontend (dev profile only) ----------

  frontend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:${API_PORT:-8000}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - wced-api
    profiles:
      - dev
    volumes:
      - ../frontend:/app
      - /app/node_modules
      - /app/.next

volumes:
  pgdata:
  redisdata:
  miniodata:
  prometheusdata:
  grafanadata:
